<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ForidDL — Video Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{--bg:#000;--surface:#050505;--border:#0f0f0f;--text:#fff;--text2:#444;--accent:#fff;--green:#00e054;--radius:18px;--radius-sm:12px}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
        .c{width:100%;max-width:440px}
        .brand{text-align:center;padding:0 0 24px}
        .br{display:inline-flex;align-items:center;gap:10px;margin-bottom:6px}
        .bl{width:42px;height:42px;background:var(--accent);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#000;font-weight:700}
        .bn{font-size:28px;font-weight:800;letter-spacing:-1px}
        .bn span{color:var(--text2);font-weight:500}
        .bt{font-size:10px;color:var(--text2);letter-spacing:2px;text-transform:uppercase}
        .platforms{display:flex;justify-content:center;gap:16px;margin-bottom:20px}
        .pi{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;opacity:0.3}
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px}
        .ig{display:flex;gap:8px}
        input{flex:1;padding:14px 16px;background:#000;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-size:13px;outline:none}
        input:focus{border-color:#222}
        input::placeholder{color:#1a1a1a}
        .btn{padding:14px 20px;border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:700;cursor:pointer}
        .btn-fetch{background:var(--accent);color:#000}
        .btn-fetch:disabled{opacity:0.3}
        .msg{display:none;padding:10px;border-radius:var(--radius-sm);font-size:11px;margin-bottom:8px}
        .err{background:rgba(255,59,48,0.05);color:#ff5c5c}
        .load{background:rgba(255,255,255,0.01);color:var(--text2);text-align:center}
        .result{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;animation:up 0.3s ease}
        @keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
        .result img{width:100%;aspect-ratio:16/10;object-fit:cover;background:#000}
        .ri{padding:16px 18px 18px}
        .vt{font-size:14px;font-weight:600;margin-bottom:4px}
        .vm{font-size:10px;color:var(--text2);margin-bottom:12px}
        .prog{display:none;height:3px;background:var(--border);border-radius:2px;margin-bottom:12px;overflow:hidden}
        .prog div{height:100%;background:var(--green);width:0;transition:width 0.3s}
        .dbtn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:var(--green);color:#000;border:none;border-radius:var(--radius-sm);font-size:14px;font-weight:700;cursor:pointer}
        .dbtn:disabled{opacity:0.5}
        .dev{margin-top:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
        .devt{font-size:10px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin-bottom:4px}
        .devn{font-size:13px;font-weight:600;margin-bottom:10px}
        .devl{display:flex;gap:8px;justify-content:center}
        .dl{padding:10px 16px;border-radius:8px;text-decoration:none;font-size:11px;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px}
        .dlg{background:#1a1a1a;border:1px solid #222}
        .dlt{background:rgba(0,136,204,0.08);border:1px solid rgba(0,136,204,0.15);color:#08c}
        .ft{text-align:center;padding:16px;color:#1a1a1a;font-size:9px}
    </style>
</head>
<body>
<div class="c">
    <div class="brand">
        <div class="br"><div class="bl">⬇</div><div class="bn">Forid<span>DL</span></div></div>
        <div class="bt">Premium Video Downloader</div>
    </div>

    <div class="platforms">
        <div class="pi"><i class="fa-brands fa-tiktok"></i></div>
        <div class="pi" style="color:#f00"><i class="fa-brands fa-youtube"></i></div>
        <div class="pi" style="color:#e1306c"><i class="fa-brands fa-instagram"></i></div>
        <div class="pi" style="color:#1877f2"><i class="fa-brands fa-facebook"></i></div>
    </div>

    <div class="card">
        <div class="ig">
            <input type="text" id="u" placeholder="Paste video link here..." autocomplete="off">
            <button class="btn btn-fetch" id="btn" onclick="G()">Fetch</button>
        </div>
    </div>

    <div class="msg err" id="e"></div>
    <div class="msg load" id="l">Analyzing video...</div>

    <div class="result" id="r">
        <img id="i" src="" alt="">
        <div class="ri">
            <div class="vt" id="t"></div>
            <div class="vm" id="m"></div>
            <div class="prog" id="pw"><div id="pf"></div></div>
            <button class="dbtn" id="d" onclick="D()"><i class="fa-solid fa-download"></i> Download</button>
        </div>
    </div>

    <div class="dev">
        <div class="devt">Developed by</div>
        <div class="devn">DARK FORID</div>
        <div class="devl">
            <a href="https://github.com/DARK-FORID-404" target="_blank" class="dl dlg"><i class="fa-brands fa-github"></i> GitHub</a>
            <a href="https://t.me/UnknownXBoy" target="_blank" class="dl dlt"><i class="fa-brands fa-telegram"></i> Telegram</a>
        </div>
    </div>

    <div class="ft">ForidDL · No Watermark · Free Forever</div>
</div>

<script>
let vU='',fN='video.mp4';

async function G(){
    let u=document.getElementById('u').value.trim();
    let eb=document.getElementById('e'),rb=document.getElementById('r'),lb=document.getElementById('l'),btn=document.getElementById('btn');
    eb.style.display='none';rb.style.display='none';lb.style.display='none';
    if(!u){eb.textContent='Enter a video URL';eb.style.display='block';return}
    if(!u.startsWith('http')){eb.textContent='Invalid URL';eb.style.display='block';return}
    lb.style.display='block';btn.disabled=true;btn.textContent='...';

    try{
        let r=await fetch('/api?url='+encodeURIComponent(u));
        let d=await r.json();
        if(d.success){
            vU=d.videoUrl;fN=d.fileName||'video.mp4';
            document.getElementById('i').src=d.thumbnail||'';
            document.getElementById('t').textContent=d.title||'Video';
            document.getElementById('m').textContent=(d.uploader?d.uploader+' · ':'')+(d.duration||'');
            rb.style.display='block';rb.scrollIntoView({behavior:'smooth'});
        }else{
            eb.textContent=d.message||'Cannot fetch video';
            eb.style.display='block';
        }
    }catch(x){
        eb.textContent='Connection error. Try again.';
        eb.style.display='block';
    }
    lb.style.display='none';btn.disabled=false;btn.textContent='Fetch';
}

async function D(){
    if(!vU)return;
    let btn=document.getElementById('d'),pw=document.getElementById('pw'),pf=document.getElementById('pf');
    btn.disabled=true;btn.innerHTML='<i class="fa-solid fa-spinner fa-spin"></i> Downloading...';
    pw.style.display='block';pf.style.width='0%';
    try{
        let r=await fetch(vU),t=parseInt(r.headers.get('content-length')||'0'),rd=r.body.getReader(),c=[],ld=0;
        while(true){let p=await rd.read();if(p.done)break;c.push(p.value);ld+=p.value.length;if(t)pf.style.width=Math.round((ld/t)*100)+'%'}
        let b=new Blob(c,{type:'video/mp4'}),bl=URL.createObjectURL(b),a=document.createElement('a');
        a.href=bl;a.download=fN;document.body.appendChild(a);a.click();
        setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(bl)},100);
        btn.innerHTML='<i class="fa-solid fa-check"></i> Downloaded';
        pf.style.width='100%';
        setTimeout(()=>{btn.innerHTML='<i class="fa-solid fa-download"></i> Download';btn.disabled=false;pw.style.display='none';pf.style.width='0%'},2500);
    }catch(x){
        let a=document.createElement('a');a.href=vU;a.download=fN;a.target='_blank';document.body.appendChild(a);a.click();document.body.removeChild(a);
        btn.innerHTML='<i class="fa-solid fa-download"></i> Download';btn.disabled=false;pw.style.display='none';
    }
}

document.getElementById('u').addEventListener('keydown',e=>{if(e.key==='Enter')G()});
window.addEventListener('load',async()=>{try{let t=await navigator.clipboard.readText();if(t&&t.includes('http'))document.getElementById('u').value=t}catch(x){}});
</script>
</body>
  </html>
